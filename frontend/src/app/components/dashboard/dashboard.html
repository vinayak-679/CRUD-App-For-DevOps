<div class="dashboard-container">
  <header class="header">
    <div class="header-left">
      <h1>Task Manager</h1>
    </div>
    <div class="header-right">
      <span class="username">{{ username }}</span>
      <button class="btn btn-outline" (click)="logout()" id="logout-btn">Logout</button>
    </div>
  </header>

  <nav class="nav-bar">
    <a routerLink="/dashboard" class="nav-link active">Dashboard</a>
    <a routerLink="/tasks" class="nav-link">Tasks</a>
  </nav>

  <main class="content">
    <h2>Welcome, {{ username }}!</h2>

    <div class="stats-grid">
      <div class="stat-card stat-total">
        <div class="stat-number">{{ totalTasks }}</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card stat-pending">
        <div class="stat-number">{{ pendingTasks }}</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card stat-progress">
        <div class="stat-number">{{ inProgressTasks }}</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card stat-completed">
        <div class="stat-number">{{ completedTasks }}</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <div class="quick-actions">
      <a routerLink="/tasks/new" class="btn btn-primary" id="quick-add-task">+ Create New Task</a>
      <a routerLink="/tasks" class="btn btn-secondary" id="quick-view-tasks">View All Tasks</a>
    </div>
  </main>
</div>
