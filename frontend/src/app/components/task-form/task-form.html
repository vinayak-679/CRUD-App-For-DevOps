<div class="page-container">
  <header class="header">
    <div class="header-left">
      <h1>Task Manager</h1>
    </div>
    <div class="header-right">
      <button class="btn btn-outline" (click)="logout()" id="logout-btn-form">Logout</button>
    </div>
  </header>

  <nav class="nav-bar">
    <a routerLink="/dashboard" class="nav-link">Dashboard</a>
    <a routerLink="/tasks" class="nav-link active">Tasks</a>
  </nav>

  <main class="content">
    <div class="form-container">
      <div class="form-header">
        <h2>{{ pageTitle }}</h2>
        <a routerLink="/tasks" class="btn btn-secondary">← Back to Tasks</a>
      </div>

      <form (ngSubmit)="onSubmit()" class="task-form" id="task-form">
        <div class="form-group">
          <label for="title">Title *</label>
          <input
            type="text"
            id="title"
            [(ngModel)]="task.title"
            name="title"
            placeholder="Enter task title"
            required
          />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            [(ngModel)]="task.description"
            name="description"
            placeholder="Enter task description"
            rows="4"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" [(ngModel)]="task.status" name="status">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        @if (errorMessage) {
          <div class="error-message">{{ errorMessage }}</div>
        }

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" [disabled]="isLoading" id="submit-task-btn">
            {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Task' : 'Create Task') }}
          </button>
          <a routerLink="/tasks" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
